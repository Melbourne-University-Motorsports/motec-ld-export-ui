name: Build Windows Exe

on:
  push:
    branches: [ "feature/github-actions-workflow", "main" ]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version Tag (optional, e.g. v1.0.0-beta)'
        required: false
        default: 'dev-build'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Executable
      run: |
        # Build the executable
        # --onefile: Create a single exe file
        # --noconsole: Don't show a terminal window when running
        # --add-data: Include assets directory (src/assets -> assets in bundle)
        # --name: Name of the output executable
        pyinstaller --onefile --noconsole --name "MotecExportUI" --add-data "src/assets;assets" src/main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        # Fallback to github.sha if version_tag is not provided or if inputs context is missing
        name: MotecExportUI-${{ github.event.inputs.version_tag || github.sha }}
        path: dist/MotecExportUI.exe
